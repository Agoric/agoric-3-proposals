name: Proposal tests

# NB: This job works differently for PRs and non-PRs. If you make significant changes,
# be sure to manually trigger the non-PR workflow before merging.

# In PRS,
# - build and run 'test' images
# - no pushing of images
#
# In `main` pushes and manual triggers,
# - build and run 'test' images
# - build 'use' images for *all passed proposals* AND push to registry (e.g. use-upgrade-10)

# In both cases it uses a remote builder with depot.dev (see depot.json) to get a persistent
# build cache and automatic multiplatform builds and image management.

# If `main` fails, you'll make a PR to fix it but its CI will only run the PR flow above.
# To test the non-PR way, you need to manually trigger this workflow by going to,
# https://github.com/Agoric/agoric-3-proposals/actions/workflows/ci.yml
# and clicking "Run workflow", specifying this branch.
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
  workflow_dispatch:
    inputs:
      from_proposal:
        description: 'Rebuild proposals from the given name'
        required: false
        default: ''
        type: string
      end_before_proposal:
        description: 'Rebuild proposals up just before to the given name'
        required: false
        default: ''
        type: string
  merge_group:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test-packages:
    runs-on: 'ubuntu-latest'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get changed packages
        uses: technote-space/get-diff-action@v6.1.2
        with:
          PATTERNS: |
            packages/**/*.json
            packages/**/.hcl
            packages/**/*.js
            packages/**/*.mjs
            packages/**/*.cjs
            packages/**/*.ts
            packages/**/*.mts
            packages/**/*.cts

      - name: Setup node
        uses: ./.github/actions/setup-node
        with:
          # we only care about the root yarn.lock for the synthetic-chain tool
          lock-path: ./yarn.lock

      - name: Install deps
        run: yarn install

      - name: Lint repo
        run: yarn lint

      - name: Typecheck synthetic-chain
        run: yarn tsc
        working-directory: packages/synthetic-chain

      - name: Test synthetic-chain
        run: yarn test
        working-directory: packages/synthetic-chain

  # Check for a forced proposal range from which to rebuild
  get-proposal-range:
    runs-on: ubuntu-latest
    outputs:
      from: ${{ fromJson(steps.get-forced-range.outputs.result).from }}
      endBefore: ${{ fromJson(steps.get-forced-range.outputs.result).endBefore }}
      range: ${{ fromJson(steps.get-forced-range.outputs.result).range }}
    steps:
      - name: Get forced proposal range
        id: get-forced-range
        env:
          INPUT_FROM_PROPOSAL: ${{ inputs.from_proposal }}
          INPUT_END_BEFORE_PROPOSAL: ${{ inputs.end_before_proposal }}
        uses: actions/github-script@v8
        with:
          script: |-
            // Workflow dispatch specifies inputs directly.
            let from = process.env.INPUT_FROM_PROPOSAL || null;
            let endBefore = process.env.INPUT_END_BEFORE_PROPOSAL || null;

            // A pull request can specify them via body content.
            if (context.payload.pull_request) {
              const { body } = context.payload.pull_request;
              const matchFrom = /^\#force-from-proposal:\s+(\S+)/m.exec(body);
              const matchEnd = /^\#force-end-before-proposal:\s+(\S+)/m.exec(body);
              from = matchFrom && matchFrom[1];
              endBefore = matchEnd && matchEnd[1];
            }

            const range = from || endBefore ? `${from || ''}/${endBefore || ''}` : null;
            console.log('Forced from proposal: ' + from);
            console.log('Forced end proposal: ' + endBefore);
            console.log('Forced range: ' + range);
            return { from, endBefore, range };

  proposals-matrix-test:
    needs: get-proposal-range
    secrets: inherit
    uses: ./.github/workflows/docker-proposals.yml
    with:
      range: ${{ needs.get-proposal-range.outputs.range || '' }}
      image_name: ${{ github.repository }}

  test-proposals:
    needs: [proposals-matrix-test]
    runs-on: ubuntu-latest
    steps:
      - run: echo success

  notify-on-failure:
    needs: [test-packages, proposals-matrix-test]
    runs-on: ubuntu-latest
    steps:
      - name: notify on failure
        if: failure() && github.event_name != 'pull_request'
        uses: ./.github/actions/notify-status
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          from: ${{ secrets.NOTIFY_EMAIL_FROM }}
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}

  # Fail if the proposal range end was forced (to block merging)
  prohibit-force-end:
    # Ensure prohibit-force-end runs last even if the conditions for notify-on-failure change over time.
    needs: [get-proposal-range, notify-on-failure]
    runs-on: ubuntu-latest
    steps:
      - name: 'Fail if the end proposal was forced'
        if: ${{ needs.get-proposal-range.outputs.endBefore }}
        run: 'exit 1'
